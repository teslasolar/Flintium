<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Templates · Flintium</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body data-page="templates">
  <div data-include="header"></div>

  <main>
    <h1 class="section-title">Templates <small><span id="count">…</span> resources</small></h1>
    <p style="color: var(--muted); max-width: 720px;">
      Vision templates grouped by Components, Panels, Icons, and Display Objects.
      Use the chips to filter, the search box to find specific items, and click any tile
      to preview and grab the source files.
    </p>

    <div id="toolbar"></div>
    <div id="gallery" class="gallery"></div>
  </main>

  <div data-include="footer"></div>

  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" role="document">
      <div class="modal-head">
        <h2 id="modal-title">Item</h2>
        <button aria-label="Close">×</button>
      </div>
      <div class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./assets/layout.js"></script>
  <script src="./assets/app.js"></script>
  <script>window.Flintium.initGalleryPage("templates").catch((e) => console.error(e));</script>
</body>
</html>
